<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L'Alchimie Littéraire</title>

  <!-- Vite injecte automatiquement les styles -->
  <script type="module" src="/src/main.js"></script>
</head>

<body class="bg-[#F4F1EA] text-[#2C302E] font-sans p-6">

  <div class="max-w-3xl mx-auto">

    <!-- TITRE -->
    <h1 class="text-3xl font-serif tracking-wide mb-6">
      L'Alchimie Littéraire
    </h1>

    <!-- FORMULAIRE -->
    <section class="bg-[#FBFBFA] p-4 rounded mb-6 shadow-sm">

      <h2 class="font-serif text-xl mb-4">Ajouter un livre</h2>

      <input id="title"
        placeholder="Titre"
        class="block mb-2 w-full border p-2 rounded" />

      <input id="author"
        placeholder="Auteur"
        class="block mb-2 w-full border p-2 rounded" />

      <input id="pages"
        type="number"
        placeholder="Nombre de pages"
        class="block mb-4 w-full border p-2 rounded" />

      <button id="addBook"
        class="bg-[#4A6B5D] text-white px-4 py-2 rounded hover:opacity-90 transition-all">
        Ajouter
      </button>

    </section>

    <!-- ACTION PRINCIPALE -->
    <section class="mb-6">

      <button id="pickBook"
        class="bg-[#4A6B5D] text-white px-6 py-3 rounded text-lg hover:opacity-90 transition-all">
        Piocher un livre
      </button>

    </section>

    <!-- RESULTAT -->
    <section id="result" class="mb-6"></section>

    <!-- LISTE DES LIVRES -->
    <section>
      <h2 class="font-serif text-xl mb-3">Ma PAL</h2>
      <div id="bookList"></div>
    </section>

  </div>

</body>
</html>
